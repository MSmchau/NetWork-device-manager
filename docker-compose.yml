services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports: ["8000:8000"]
    volumes: ["./backups:/app/backups"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: net_admin
      DB_PASSWORD: NetAdmin@123456
      DB_NAME: network_platform
      CORS_ORIGINS: http://192.168.139.172:3000,http://192.168.139.172:3001
      FERNET_SECRET_KEY: ${FERNET_SECRET_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE: http://192.168.139.172:8000/api/v1
    ports: ["3000:80"]
    depends_on: [backend]
  mysql:
    image: mysql:8.0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: network_platform
      MYSQL_USER: net_admin
      MYSQL_PASSWORD: NetAdmin@123456
    ports: ["3306:3306"]
